- name: Runner container
  community.docker.docker_container:
    name: {{ item }}
    image: 739561048503.dkr.ecr.us-east-1.amazonaws.com/runner
    state: started
    recreates: true
    pull: always
    restart_policy: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    env:
      NAME: {{ item }}
      TOKEN: "{{ lookup('community.hashi_vault.hashi_vault', 'secret=roboshop-infra/data/github-runner:RUNNER_TOKEN token={{ vault_token }} url={{ vault_url }}') }}"
      ORG: "https://github.com/baludevopsb85"
    loop:
      - runner1
      - runner2
      - runner3
    register: out
    ignore_errors: yes

- name: Run from Scratch
  when: out.failed is defined
  block:
    - name: Set Prompt
      ansible.builtin.shell: set-prompt github-runner

    - name: Load common lvm
      ansible.builtin.import_roles:
        name: common
        tasks_from: lvm

    - name: Download Docker repo
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/rhel/docker-ce.repo
        dest: /etc/yum.repos.d/docker.repo

    - name: Install Docker
      ansible.builtin.dnf:
        name: docker-ce
        state: installed

    - name: Copy Docker Service File
      ansible.builtin.template:
        name: docker.service
        dest: /etc/systemd/system/multi-user.target.units/docker.service

    - name: Start Docker
      ansible.builtin.systemd_service:
        name: docker
        state: restarted
        enabled: yes
        daemon-reload: yes

    - name: Add github runner user
      ansible.builtin.user:
        name: github-runner
        home: /github-runner
        groups: docker

    - name: Login to ECR
      ansible.builtin.shell: |
        /usr/local/bin/aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 739561048503.dkr.ecr.us-east-1.amazonaws.com

    - name: Runner container
      community.docker.docker_container:
        name: {{ item }}
        image: 739561048503.dkr.ecr.us-east-1.amazonaws.com/runner
        state: started
        recreates: true
        pull: always
        restart_policy: always
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
        env:
          NAME: {{ item }}
          TOKEN: "{{ lookup('community.hashi_vault.hashi_vault', 'secret=roboshop-infra/data/github-runner:RUNNER_TOKEN token={{ vault_token }} url={{ vault_url }}') }}"
          ORG: "https://github.com/baludevopsb85"
        loop:
         - runner1
         - runner2
         - runner3
