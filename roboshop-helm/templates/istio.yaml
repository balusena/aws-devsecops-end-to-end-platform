apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ .Values.appName }}
spec:
  mtls:
    mode: PERMISSIVE
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ .Values.appName }}
spec:
  selector:
    matchLabels:
      component: {{ .Values.appName }}
  mtls:
    mode: PERMISSIVE
      {{- if .Values.istio.enabled }}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ .Values.appName }}-allow
spec:
  selector:
    matchLabels:
      component: {{ .Values.appName }}
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
               {{- range .Values.istio.principals }}
    - {{ . }}
     {{- end }}
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ .Values.appName }}-deny
spec:
  selector:
    matchLabels:
      component: {{ .Values.appName }}
  action: DENY
  rules:
    - from:
        - source:
            notPrincipals:
             {{- range .Values.istio.principals }}
    - {{ . }}
        {{- end }}
      {{- end }}